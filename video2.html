<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Video</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
	@font-face{
		font-family: Georgia;
		src: url("Georgia.ttf");
	}
    * {
        margin: 0;
        padding: 0;
    } body {
        background: whitesmoke;
    } #page {
        width: 1024px;
        height: 1525px;
        background: white;
        border: 1px solid darkgray;
        box-shadow: 2px 3px 6px darkgray;
        margin: 24px auto;
    } #textbox {
        width: 768px;
        height: 768px;
        margin: 48px auto;
        border: 1px dashed gray;
    } #banner {
        width: 1024px;
    } h1 {
        font: 48pt/1.4em 'Dancing Script';
        text-align: center;
        margin: 54px 0 0 0;
        color: brown;
        text-shadow: 2px 3px 6px darkgray;
    } p {
        font: 14pt/1.4em Georgia;
        width: 768px;
        margin: 24px auto;
        padding-bottom: 175px;
    } img.float-left {
        width: 300px;
        float: left;
        margin: 0 24px 0 0;
        border: 1px solid darkgray;
        box-shadow: 2px 3px 6px darkgray;
    } ul {
        width: 100%;
        margin-top: -4px;
    } li {
        font: 14pt/2.0em Georgia;
        list-style: none;
        float: left;
        width: 50%;
        height: 40px;
        text-align: center;
        background: rgba(169,225,245,0.80);
    } a li {
        color: black;
    } a {
        text-decoration: none;
    } li:hover, a li:hover {
        background: rgba(169,225,245,0.50);
	} video {
		width: 640px;
		height: 360px;
		margin-top:  48px;
		display: block;
		border: 1px solid dimgray;
		box-shadow: 2px 3px 6px dimgray;
	}figure{
		width: 640px;
		margin: 0 auto;
	} figcaption {
		font: italic 12pt/1.4em Georgia;
		margin-top: 6px;
		text-align: center;
	}
	
</style>
</head>

<body>
    <div id="page">
        <ul>
            <li>Home</li>
            <li>Website</li>
        </ul>
        <h1>My Website</h1>
		<figure>
		<video controls = "controls" poster="thumb.png">
			<source src="vidja.mp4">
		</video>
		<figcaption>Video about my website</figcaption>
		</figure>
   </div>
</body>
</html>
